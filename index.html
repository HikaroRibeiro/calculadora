<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <title>Calculadora em ReactJS</title>
</head>

<style type="text/tailwindcss">
    @theme {
        --text: #EBEBEB;
        --text-secondary: #6B6B6B;
        --primary: #462878;
        --background: #2d2a37;

        --gradient: 180deg, rgba(0, 0, 0, 0.05) 0%, rgba(255, 255, 255, 0.05) 100%, #2d2a37;

        --gradient-hover: 180deg, rgba(0, 0, 0, 0.1) 0%, 
        rgba(255, 255, 255, 0.1) 100%, #2d2a37;

        --shadow: 0px 11px 7px 0px rgba(0, 0, 0, 0.01),
        0px 7px 7px 0px rgba(0, 0, 0, 0.04),
        0px 4px 6px 0px rgba(0, 0, 0, 0.10),
        0px 2px 4px 0px rgba(0, 0, 0, 0.26),
        0px 0px 2px 0px rgba(0, 0, 0, 0.29),
        0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;

        --font-sans: 'Rubik', sans-serif;

    }
</style>
<body class="min-h-screen bg-linear-[180deg,_#807ece_0%,_#8e7ece_100%] text-(--text) font-(--font-sans)">
    <div id="root">
        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
        <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
        <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
        <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

        <script type="text/babel">

            const textVariants = {
                default: 'text-xl',
                muted: 'text-xl text-(--text-secondary)',
                heading: 'text-2xl',
                blast: 'text-3xl',
            }

            const buttonVariants = {
                default: 'bg-(--background)',
                primary: 'bg-(--primary)',
            }

            const buttons = [
                [
                    {input: 'CE'},
                    {input: 'C', className: 'flex-1 h-16'},
                    {input: '/', variant: 'primary'},
                ],
                [
                    {input: '7'},
                    {input: '8'},
                    {input: '9'},
                    {input: '*', variant: 'primary'},
                ],
                [
                    {input: '4'},
                    {input: '5'},
                    {input: '6'},
                    {input: '-', variant: 'primary'},
                ],
                [
                    {input: '1'},
                    {input: '2'},
                    {input: '3'},
                    {input: '+', variant: 'primary'},
                ],
                [
                    {input: '0', className: 'flex-1 h-16'},
                    {input: ','},
                    {input: '=', className: 'w-16 h-16 bg-[#7f45e2]'},
                ],
            ]

            function Text({ 
                as = 'span', 
                variant = 'default',
                className,
                children, 
                ...props}) {
                return React.createElement(
                    as, 
                    { ...props, className: `${textVariants[variant]} ${className ? className : ''}` },
                    children)
            }

            function Button({ 
                variant = 'default',
                className, 
                children, 
                ...props }) {
                return (
                    <Text as="button" variant="heading" className={`
                        flex items-center justify-center rounded-xl 
                        p-3 cursor-pointer text-(--text)  
                        bg-linear-(--gradient) 
                        hover:bg-linear-(--gradient-hover)
                        shadow-(--shadow)
                        ${buttonVariants[variant]}
                        ${className ? className : ''}
                        `} {...props}>
                        {children}
                    </Text>
                )
            }

            function Card({className, children, ...props}) {
                return (
                    <div className={`
                        rounded-2xl 
                        shadow-(--shadow)
                        bg-(--background)
                        ${className ? className : ''}
                    `} {...props}>
                        {children}
                    </div>
                )
            }
            
            function CalculatorDisplay({operation = '1 + 1', result = '2'}) {
                return(
                    <div className={`
                        flex flex-col gap-2 px-[1.375rem]
                        cursor-default select-none
                        `}>
                        <Text variant="muted" as="div" className="flex items-center justify-end">{operation}</Text>
                        <div className={`flex items-center justify-between`}>
                            <Text variant="muted"> = </Text>
                            <Text variant="blast"> {result} </Text>
                        </div>
                    </div>
                )
            }



            function Calculator() {
            
            const [operation, setOperation] = React.useState('')
            const [result, setResult] = React.useState('')

            function HandleButtonClick(input) {
                if(input === 'C') {
                    setOperation('')
                    setResult('')
                    return;
                }
                
                if(input === 'CE') {
                    const operationParts = operation.slice(0, -2)
                    setOperation(operationParts)
                    return;
                }

                if(input === '=') {
                    const operationResult = eval(operation.replace(/,/g, '.'))
                    const parsedResult = operationResult.toString().replace(/\./g, ',')
                    setResult(parsedResult)
                    return;
                }

                if(result){
                    setOperation(isNaN(input) ? `${result}${input}` : input)
                    setResult('')
                    return;
                }

                if(input === ',' && !operation.endsWith(',')) {
                    setOperation(`${operation},`)
                    return;
                }

                setOperation(`${operation}${input}`)

            }

                return (
                    <Card className={`
                        flex flex-col gap-[1.625rem] w-[22.5rem]
                        pt-14 px-8 pb-8
                        
                        `}> 
                        <CalculatorDisplay operation={operation} result={result} />
                        <div className="flex flex-col gap-3">
                            {buttons.map((row, index) => (
                                <div key={`row-${index}`} className="flex gap-3">
                                {row.map((button, index) => (
                                    <Button 
                                        key={button.input} 
                                        className={button.className ||"w-16 h-16"}
                                        variant={button.variant}
                                        onClick={() => HandleButtonClick(button.input)}>
                                        {button.input}
                                        
                                    </Button>       
                                ))}
                                </div>
                            ))}
                        </div>
                    </Card>
                )
            }

            function OperationHistory() {
                return (
                    <Card className="py-10 px-8 w-full">
                        <Text as="h1" variant="heading" className="mb-4">Histórico de Operações</Text>
                        <ul className="flex flex-col gap-3">
                            <li>1 + 1 = 2</li>
                            <li>2 + 2 = 4</li>
                            <li>2 + 2 + 4 = 8</li>
                        </ul>
                    </Card>
                )
            }

            function App() {
                return (
                        <main className={`
                            py-28 px-4 
                            flex flex-col sm:flex-row 
                            items-center sm:items-stretch
                            gap-2`}>
                            <Calculator />
                            <OperationHistory />
                        </main>
                    )
            }
            ReactDOM.createRoot(document.getElementById('root')).render(<App />)
        </script>
    </div>
</body>
</html>
